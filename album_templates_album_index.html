<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Trejos</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        .foto-card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .foto-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
        }
        .desc { margin-top: 10px; color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Galería de Fotos ({{ fotos.count }})</h1>
    
    <div class="galeria">
        {% for foto in fotos %}
            <div class="foto-card">
                <img src="{{ foto.imagen.url }}" alt="Foto {{ foto.id }}">
                {% if foto.descripcion %}
                <div class="desc">{{ foto.descripcion }}</div>
                {% endif %}
            </div>
        {% empty %}
            <p>No hay fotos cargadas aún.</p>
        {% endfor %}
    </div>
</body>
</html>
